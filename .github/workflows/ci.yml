name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/realm/swiftlint:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run SwiftLint
        working-directory: ios
        run: swiftlint lint --reporter github-actions-logging

  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # TCA uses Swift Macros; skip fingerprint validation (same as ci_scripts/ci_post_clone.sh)
      - name: Enable Swift Macros
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: ios/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('ios/videoPlayer.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Select simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -E '^\s+iPhone' | head -n 1 | sed -E 's/^[[:space:]]*(.+) \([0-9A-F-]+\) \(.*$/\1/')
          echo "Using simulator: $DEVICE"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Build and run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project ios/videoPlayer.xcodeproj \
            -scheme videoPlayer \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -clonedSourcePackagesDirPath ios/SourcePackages \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            -only-testing:videoPlayerTests \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions
